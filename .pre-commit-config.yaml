repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
-   repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
    -   id: codespell
-   repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.27.0
    hooks:
    -   id: zizmor
